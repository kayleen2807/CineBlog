<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineBlog</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Anton&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#212f4f;
  --sidebar:#020617;
  --card:#131b27;
  --primary:#3b82f6;
  --muted:#bac1cc;
}

*{ box-sizing:border-box; }

.cine-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-color: #0b1424;
  overflow: hidden;
  pointer-events: none;
}

.cine-bg canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0.18;
}

body{
  margin:0;
  font-family:'Outfit', sans-serif;
  background:transparent;
  color:white;
  display:flex;
  min-height:100vh;
  position: relative;
  z-index: 1;
}

.sidebar{
  width:240px;
  background: rgba(2, 6, 23, 0.85);
  backdrop-filter: blur(12px);
  min-height:100vh;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  overflow-y:auto;
  border-right:1px solid rgba(59,130,246,0.15);
  position: relative;
  z-index: 2;
}

.perfil-btn{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  background:var(--card);
  border-radius:10px;
  margin-bottom:20px;
  cursor:pointer;
  transition:background 0.2s;
}
.perfil-btn:hover{ background:#333c5f; }

.sb-item{
  margin:15px 0;
  color:var(--muted);
  cursor:pointer;
  transition:color 0.2s;
}
.sb-item:hover{ color:white; }

.sb-section{ margin:25px 0; }
.sb-section-title{
  font-weight:600;
  margin-bottom:12px;
  font-size:0.85rem;
  color:white;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

.type-filter{ display:flex; gap:8px; margin-bottom:20px; }
.type-btn{
  flex:1; padding:10px 12px; border-radius:8px;
  background:var(--card); cursor:pointer; text-align:center;
  font-size:0.9rem; transition:all 0.2s; border:1px solid transparent;
  color:var(--muted); font-weight:500;
}
.type-btn:hover{ background:#333c5f; }
.type-btn.active{ background:var(--primary); color:white; }

.pills{ display:flex; gap:8px; flex-wrap:wrap; }
.pill{
  padding:8px 12px; border-radius:20px; background:var(--card);
  cursor:pointer; font-size:0.85rem; transition:all 0.2s;
  border:1px solid transparent; color:var(--muted);
}
.pill:hover{ background:var(--primary); color:white; }
.pill.on{ background:var(--primary); color:white; }


.main{
  flex:1;
  display:flex;
  flex-direction:column;
  position: relative;
  z-index: 2;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  border-bottom:1px solid rgba(9, 82, 201, 0.15);
  background: rgba(18, 28, 51, 0.7);
  backdrop-filter: blur(16px);
  gap:20px;
}
.logo-text{ font-family:'Space Grotesk', sans-serif; font-size:2rem; font-weight:700; letter-spacing:2px; min-width:fit-content; }
.logo-text span{ color:var(--primary); }
.tendencies{ font-family:'Anton', sans-serif; letter-spacing:1.5px; font-size:1rem; color:var(--muted); text-decoration:underline; flex:0; cursor:pointer; }
.search-wrap{
  display:flex; align-items:center; gap:8px;
  background:var(--card); padding:10px 12px;
  border-radius:8px; flex:1; max-width:300px;
}
.search-wrap input{
  background:transparent; border:none; padding:0;
  color:white; width:100%; font-size:0.9rem; outline:none;
}
.search-wrap input::placeholder{ color:var(--muted); }

.feed{
  flex:1;
  padding:20px;
  overflow-y:auto;
}
.feed-inner{ max-width:700px; margin:0 auto; }

.post-card{
  background: rgba(30,41,59,0.85);
  backdrop-filter: blur(8px);
  padding:20px; border-radius:15px; margin-bottom:20px;
  transition:all 0.2s; border:1px solid transparent;
}
.post-card:hover{ transform:translateY(-2px); border-color:var(--primary); }

.post-head{
  display:flex; justify-content:space-between;
  align-items:flex-start; margin-bottom:12px;
}
.post-info{ display:flex; flex-direction:column; gap:4px; }
.post-title{ font-weight:bold; font-size:1.1rem; color:white; }
.post-date{ font-size:0.8rem; color:var(--muted); }
.post-body{ color:var(--muted); margin-bottom:16px; line-height:1.5; font-size:0.95rem; }

.post-imgs{
  display:grid; grid-template-columns:1fr 1fr;
  gap:12px; margin-bottom:16px;
  border-radius:10px; overflow:hidden;
}
.post-img{
  width:100%; height:200px; object-fit:cover;
  border-radius:10px; cursor:pointer; transition:transform 0.2s;
}
.post-img:hover{ transform:scale(1.02); }
.post-actions{
  display:flex; gap:16px; font-size:1.2rem;
  color:var(--muted); cursor:pointer;
}
.post-actions span{ transition:color 0.2s; }
.post-actions span:hover{ color:var(--primary); }

.create-post{
  position:fixed; bottom:20px; right:20px;
  width:55px; height:55px; border-radius:50%;
  background:var(--primary); display:flex;
  align-items:center; justify-content:center;
  font-size:2rem; cursor:pointer;
  box-shadow:0 4px 12px rgba(77, 131, 218, 0.4);
  transition:all 0.2s; border:none; color:white; z-index: 10;
}
.create-post:hover{
  transform:scale(1.1);
  box-shadow:0 6px 16px rgba(71, 128, 219, 0.6);
}

@media(max-width:768px){
  body{ flex-direction:column; }
  .sidebar{
    width:100%; min-height:auto; flex-direction:row;
    justify-content:flex-start; gap:20px;
    border-right:none; border-bottom:1px solid var(--card); overflow-x:auto;
  }
  .topbar{ flex-wrap:wrap; }
  .search-wrap{ max-width:100%; flex:1; min-width:200px; }
  .post-imgs{ grid-template-columns:1fr; }
  .post-img{ height:250px; }
}
</style>
</head>
<body>

<div class="cine-bg">
  <canvas id="cineBg"></canvas>
</div>

<aside class="sidebar">
  <div style="display:flex;flex-direction:column;gap:15px;">
    <div class="perfil-btn">👤 <span>Perfil</span></div>

    <div class="sb-section">
      <div class="sb-section-title">TIPO</div>
      <div class="type-filter">
        <button class="type-btn active" onclick="selType(this,'movies')">Películas</button>
        <button class="type-btn" onclick="selType(this,'series')">Series</button>
      </div>
    </div>


    <div class="sb-section">
      <div class="sb-section-title">CATEGORÍAS</div>
      <div class="pills">
        <span class="pill on" onclick="selPill(this)">Romance</span>
        <span class="pill" onclick="selPill(this)">Ciencia ficción</span>
        <span class="pill" onclick="selPill(this)">Acción</span>
        <span class="pill" onclick="selPill(this)">Comedia</span>
        <span class="pill" onclick="selPill(this)">Animación</span>
        <span class="pill" onclick="selPill(this)">Terror</span>
        <span class="pill" onclick="selPill(this)">Drama</span>
        <span class="pill" onclick="selPill(this)">Aventura</span>
        <span class="pill" onclick="selPill(this)">Suspenso</span>
      </div>
    </div>
  </div>

  
  <div style="display:flex;flex-direction:column;gap:10px;border-top:1px solid var(--card);padding-top:15px;">
    <div class="sb-item">🔔 Notificaciones</div>
    <div class="sb-item">⚙️ Configuración</div>
    <div class="sb-item">🚪 Cerrar sesión</div>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="logo-text"><span>C</span>ineBlog</div>
    <span class="tendencies">Tendencias</span>
    <div class="search-wrap">
      🔍 <input type="text" placeholder="¿Que estas buscando?...">
    </div>
  </header>

  <div class="feed">
    <button class="create-post" title=>+</button>
    <div class="feed-inner"></div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('cineBg');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    draw();
  }

  function drawIcon(ctx, type, x, y, size, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.strokeStyle = '#3b82f6';
    ctx.fillStyle   = '#3b82f6';
    ctx.lineWidth   = size * 0.06;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';

    const s = size;

//fondo
    switch(type) {

      case 'popcorn': {
        
        ctx.beginPath();
        ctx.moveTo(-s*0.32, -s*0.05);
        ctx.lineTo(-s*0.38, s*0.48);
        ctx.lineTo( s*0.38, s*0.48);
        ctx.lineTo( s*0.32, -s*0.05);
        ctx.closePath();
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(-s*0.1, -s*0.05);
        ctx.lineTo(-s*0.13, s*0.48);
        ctx.moveTo( s*0.1, -s*0.05);
        ctx.lineTo( s*0.13, s*0.48);
        ctx.stroke();
        
        ctx.lineWidth = size * 0.05;
        const pops = [
          [-s*0.28, -s*0.26, s*0.17],
          [ s*0.0,  -s*0.35, s*0.17],
          [ s*0.28, -s*0.26, s*0.17],
          [-s*0.14, -s*0.18, s*0.14],
          [ s*0.14, -s*0.18, s*0.14],
        ];
        pops.forEach(([px,py,pr]) => {
          ctx.beginPath();
          ctx.arc(px, py, pr, 0, Math.PI*2);
          ctx.stroke();
        });
        break;
      }

    
      case 'clapper': {
       
        ctx.beginPath();
        ctx.roundRect(-s*0.42, -s*0.12, s*0.84, s*0.56, s*0.06);
        ctx.stroke();
       
        ctx.beginPath();
        ctx.roundRect(-s*0.42, -s*0.42, s*0.84, s*0.3, [s*0.06, s*0.06, 0, 0]);
        ctx.stroke();
       
        for(let i = 0; i < 4; i++){
          const startX = -s*0.42 + i * s*0.22;
          ctx.beginPath();
          ctx.moveTo(startX, -s*0.42);
          ctx.lineTo(startX + s*0.14, -s*0.12);
          ctx.stroke();
        }
        
        ctx.lineWidth = size * 0.04;
        [-s*0.05, s*0.1, s*0.25].forEach(yy => {
          ctx.beginPath();
          ctx.moveTo(-s*0.32, yy); ctx.lineTo(s*0.32, yy);
          ctx.stroke();
        });
        break;
      }

    
      case 'camera': {
        ctx.beginPath();
        ctx.roundRect(-s*0.42, -s*0.28, s*0.64, s*0.56, s*0.06);
        ctx.stroke();
      
        ctx.beginPath();
        ctx.arc(-s*0.1, 0, s*0.2, 0, Math.PI*2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(-s*0.1, 0, s*0.1, 0, Math.PI*2);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(s*0.22, -s*0.1);
        ctx.lineTo(s*0.42, -s*0.24);
        ctx.lineTo(s*0.42,  s*0.24);
        ctx.lineTo(s*0.22,  s*0.1);
        ctx.closePath();
        ctx.stroke();
        break;
      }

      
      case 'star': {
        const spikes = 5, outerR = s*0.42, innerR = s*0.18;
        ctx.beginPath();
        for(let i = 0; i < spikes*2; i++){
          const r = i%2===0 ? outerR : innerR;
          const a = (i * Math.PI / spikes) - Math.PI/2;
          i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
                : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
        }
        ctx.closePath();
        ctx.stroke();
        break;
      }

      case 'film': {
        ctx.beginPath();
        ctx.roundRect(-s*0.48, -s*0.28, s*0.96, s*0.56, s*0.04);
        ctx.stroke();
        
        [-s*0.17, s*0.0, s*0.17].forEach(yy => {
          ctx.beginPath();
          ctx.roundRect(-s*0.44, yy - s*0.08, s*0.1, s*0.14, s*0.02);
          ctx.stroke();
        });
        [-s*0.17, s*0.0, s*0.17].forEach(yy => {
          ctx.beginPath();
          ctx.roundRect(s*0.34, yy - s*0.08, s*0.1, s*0.14, s*0.02);
          ctx.stroke();
        });
        [-s*0.18, s*0.04].forEach(xx => {
          ctx.beginPath();
          ctx.roundRect(xx - s*0.03, -s*0.18, s*0.22, s*0.36, s*0.02);
          ctx.stroke();
        });
        break;
      }
      case 'ticket': {
        ctx.beginPath();
        ctx.roundRect(-s*0.46, -s*0.24, s*0.92, s*0.48, s*0.06);
        ctx.stroke();

        ctx.setLineDash([s*0.05, s*0.05]);
        ctx.beginPath();
        ctx.moveTo(s*0.1, -s*0.24);
        ctx.lineTo(s*0.1,  s*0.24);
        ctx.stroke();
        ctx.setLineDash([]);
        
        ctx.beginPath();
        ctx.arc(-s*0.46, 0, s*0.08, -Math.PI/2, Math.PI/2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc( s*0.46, 0, s*0.08, Math.PI/2, -Math.PI/2);
        ctx.stroke();
        
        ctx.lineWidth = size*0.04;
        [[-s*0.08, -s*0.1], [-s*0.08, s*0.02], [-s*0.08, s*0.12]].forEach(([lx,ly]) => {
          ctx.beginPath();
          ctx.moveTo(-s*0.3, ly); ctx.lineTo(lx, ly);
          ctx.stroke();
        });
        break;
      }
    }

    ctx.restore();
  }

  
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const CELL = 90;          
    const ANGLE = Math.PI/6;  
    const icons = ['popcorn','clapper','camera','star','film','ticket'];

    const cols = Math.ceil(canvas.width  / CELL) + 4;
    const rows = Math.ceil(canvas.height / CELL) + 4;

    for(let row = -2; row < rows; row++){
      for(let col = -2; col < cols; col++){
        const offX = (row % 2) * (CELL / 2);
        const x = col * CELL + offX - CELL;
        const y = row * CELL - CELL;

        
        const idx = ((row * 7 + col * 13) & 0xffff) % icons.length;
       
        const baseAngle = (row + col) % 2 === 0 ? ANGLE : -ANGLE;

        drawIcon(ctx, icons[idx], x, y, 32, baseAngle);
      }
    }
  }

  window.addEventListener('resize', resize);
  resize();
})();

function selType(el, type){
  el.closest('.type-filter').querySelectorAll('.type-btn').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
}

function selPill(el){
  el.closest('.pills').querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
}
</script>

</body>
</html>
